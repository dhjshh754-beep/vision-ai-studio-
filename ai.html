<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Generator</title>

<style>
body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
color:#00e5ff;
}

textarea{
width:100%;
height:150px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin:20px 0;
}

button{
width:100%;
padding:15px;
background:#00e5ff;
color:#000;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#00bcd4;
}

.card{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
}

video{
width:100%;
margin-top:15px;
display:none;
}
</style>

</head>
<body>

<div class="container">

<h1>🎬 AI Video Generator</h1>

<textarea id="prompt" placeholder="Describe your AI video..."></textarea>

<button onclick="generateVideo()">Generate Video</button>

<div class="card">

<h3>Status</h3>

<p id="status">Ready...</p>

<video id="video" controls></video>

</div>

</div>

<script>

function generateVideo(){

let prompt=document.getElementById("prompt").value;

if(prompt==""){

document.getElementById("status").innerHTML="❌ Please write a prompt.";

return;

}

document.getElementById("status").innerHTML="⏳ AI is generating your video...";

setTimeout(function(){

document.getElementById("status").innerHTML="✅ Website is ready. AI Video API will be connected next.";

},3000);

}

</script>

</body>
  </html>
